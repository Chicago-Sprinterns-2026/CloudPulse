server {
    listen 8080;
    server_name localhost;

    location /api/ {
        proxy_pass https://cloudpulsebackend-1098468887328.us-central1.run.app/api/;
        proxy_set_header Host cloudpulsebackend-1098468887328.us-central1.run.app;
        proxy_ssl_server_name on;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}